{% extends 'layout.html' %}
{% block content %}
<h2>{{ note.title }}</h2>
<p>
    {{ note.text }}
</p>
<p>
    Writer: {{ note.user.username }}
</p>
    <form method="POST">
        {% csrf_token %}
        Are you sure you want to delete this note?
        <input type="submit" value="Yes" />
        <a href="{% url 'show_note' note.pk %}">Cancel</a>
    </form>
{% endblock %}
